version: '3.8'

services:
  neo4j:
    image: neo4j:5
    container_name: campfires-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"   # HTTP UI
      - "7687:7687"   # Bolt
    volumes:
      - ./context_storage/neo4j/data:/data
      - ./context_storage/neo4j/logs:/logs
      - ./context_storage/neo4j/plugins:/plugins